name: Deploy to GitHub Pages

# Builds the React app (in /app) and publishes the site to GitHub Pages.
# Layout on Pages:
#   /thallo-digital/        -> static site (repo root, unchanged)
#   /thallo-digital/app/    -> React app build
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install & build React app
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Assemble Pages site (static root + React app under /app)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='app' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='_site' \
            ./ _site/
          mkdir -p _site/app
          cp -r app/dist/. _site/app/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
